name: Super Bot (2GB)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg aria2

    - name: Install Python Libraries
      run: |
        pip install -r requirements.txt

    - name: Run Bot
      env:
        # You must add these 4 secrets in GitHub Settings -> Secrets
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        KEY: ${{ secrets.KEY }}
      run: |
        # The timeout command stops the script after 330 minutes (5 hours 30 mins)
        # The '|| true' prevents the workflow from failing when the timeout kills the bot
        timeout 330m python bot.py || true

    - name: Wait 20 seconds
      run: |
        sleep 20

    - name: Restart New Workflow
      env:
        # GITHUB_TOKEN is automatically provided by GitHub, no need to add it to Secrets manually
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Uses the GitHub CLI to trigger this exact same workflow again on the same branch
        gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}"
